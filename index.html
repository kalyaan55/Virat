<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalyaan — Login</title>
<link rel="stylesheet" href="style.css">
<style>
  body { background:linear-gradient(135deg,#1a0050 0%,#2d0080 50%,#1a0050 100%); display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .auth-box { width:100%; max-width:380px; }
  .auth-logo { font-size:42px; font-weight:900; text-align:center; color:#fff; letter-spacing:-1px; text-shadow:0 0 30px rgba(139,92,246,.8); }
  .auth-logo span { color:var(--gold); }
  .auth-sub { font-size:13px; color:rgba(255,255,255,.6); text-align:center; margin:6px 0 28px; }
  .auth-card { background:rgba(255,255,255,.05); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,.15); border-radius:20px; padding:24px; }
  .auth-tabs { display:flex; background:rgba(255,255,255,.08); border-radius:10px; overflow:hidden; margin-bottom:22px; }
  .auth-tab { flex:1; background:none; border:none; font-family:'Poppins',sans-serif; font-size:14px; font-weight:600; padding:11px; cursor:pointer; color:rgba(255,255,255,.5); transition:all .2s; }
  .auth-tab.active { background:var(--primary); color:#fff; border-radius:8px; }
  .form-label { color:rgba(255,255,255,.7) !important; }
  .form-input { background:rgba(255,255,255,.1) !important; border-color:rgba(255,255,255,.2) !important; color:#fff !important; }
  .form-input::placeholder { color:rgba(255,255,255,.35); }
  .form-input:focus { border-color:var(--primary) !important; background:rgba(255,255,255,.15) !important; }
  .btn-auth { width:100%; background:linear-gradient(135deg,var(--primary),var(--primary2)); border:none; border-radius:10px; color:#fff; font-family:'Poppins',sans-serif; font-size:15px; font-weight:700; padding:14px; cursor:pointer; margin-top:4px; transition:opacity .2s; }
  .btn-auth:hover { opacity:.9; }
  .auth-error { font-size:12px; color:#fca5a5; text-align:center; margin-top:8px; min-height:16px; }
  .uid-box { background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.2); border-radius:10px; padding:11px 13px; font-size:14px; color:rgba(255,255,255,.5); margin-bottom:14px; }
  .ref-note { font-size:11px; color:rgba(255,255,255,.4); text-align:center; margin-top:12px; }
  .ref-note span { color:var(--gold); }
</style>
</head>
<body>
<div class="auth-box">
  <div class="auth-logo">K<span>alyaan</span></div>
  <div class="auth-sub">🎮 India's #1 Prediction Gaming Platform</div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login',this)">Login</button>
      <button class="auth-tab" onclick="switchTab('register',this)">Register</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <label class="form-label">Username</label>
      <input class="form-input" id="loginUser" placeholder="Enter username" />
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="loginPass" placeholder="Enter password" />
      <button class="btn-auth" id="loginBtn" onclick="doLogin()">LOGIN</button>
      <div class="auth-error" id="loginError"></div>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" style="display:none">
      <label class="form-label">Full Name</label>
      <input class="form-input" id="regName" placeholder="Your full name" />
      <label class="form-label">Username</label>
      <input class="form-input" id="regUser" placeholder="Choose username (min 3 chars)" oninput="genUID()" />
      <label class="form-label">Your ID (Auto)</label>
      <div class="uid-box" id="regUID">Will be generated...</div>
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="regPass" placeholder="Min 6 characters" />
      <label class="form-label">Referral Code (Optional)</label>
      <input class="form-input" id="regRef" placeholder="Enter referral code" style="text-transform:uppercase" />
      <button class="btn-auth" id="regBtn" onclick="doRegister()">CREATE ACCOUNT</button>
      <div class="auth-error" id="registerError"></div>
      <div class="ref-note">Use referral code to get <span>+₹20 bonus</span>! 🎁</div>
    </div>
  </div>
</div>

<script type="module">
  import {
    ADMIN_USER, ADMIN_PASS,
    getSession, setSession, clearSession,
    getAdminSession, setAdminSession,
    getUser, saveUser, getAllUsers,
    getNextUID, applyReferral, addTransaction
  } from './firebase-config.js';

  window.addEventListener('load', async () => {
    if (getAdminSession()) { window.location.href = 'admin.html'; return; }
    const cu = getSession();
    if (cu) {
      const user = await getUser(cu);
      if (user && !user.blocked) { window.location.href = 'home.html'; }
    }
  });

  window.switchTab = function(tab, btn) {
    document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('loginForm').style.display    = tab==='login'    ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab==='register' ? 'block' : 'none';
  };

  window.genUID = async function() {
    const v = document.getElementById('regUser').value.trim();
    if (!v) { document.getElementById('regUID').textContent = 'Will be generated...'; return; }
    const all = await getAllUsers();
    document.getElementById('regUID').textContent = 'KY' + String(Object.keys(all).length + 1).padStart(6,'0');
  };

  window.doLogin = async function() {
    const u   = document.getElementById('loginUser').value.trim().toLowerCase();
    const p   = document.getElementById('loginPass').value;
    const err = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');
    if (!u || !p) { err.textContent = 'Fill all fields'; return; }
    if (u === ADMIN_USER && p === ADMIN_PASS) { setAdminSession(); window.location.href = 'admin.html'; return; }
    btn.textContent = 'Checking...'; btn.disabled = true;
    const user = await getUser(u);
    btn.textContent = 'LOGIN'; btn.disabled = false;
    if (!user)              { err.textContent = 'Username not found'; return; }
    if (user.password !== p){ err.textContent = 'Wrong password'; return; }
    if (user.blocked)       { err.textContent = '⛔ Account blocked. Contact admin.'; return; }
    setSession(u);
    window.location.href = 'home.html';
  };

  window.doRegister = async function() {
    const name   = document.getElementById('regName').value.trim();
    const user   = document.getElementById('regUser').value.trim().toLowerCase();
    const pass   = document.getElementById('regPass').value;
    const refCode= document.getElementById('regRef').value.trim().toUpperCase();
    const err    = document.getElementById('registerError');
    const btn    = document.getElementById('regBtn');

    if (!name||!user||!pass) { err.textContent='Fill all fields'; return; }
    if (user.length < 3)     { err.textContent='Username min 3 chars'; return; }
    if (pass.length < 6)     { err.textContent='Password min 6 chars'; return; }

    btn.textContent='Checking...'; btn.disabled=true;
    const existing = await getUser(user);
    if (existing) { err.textContent='Username already taken'; btn.textContent='CREATE ACCOUNT'; btn.disabled=false; return; }

    const uid = await getNextUID();
    // Generate this user's referral code
    const myRefCode = user.toUpperCase().slice(0,4) + Math.floor(1000+Math.random()*9000);

    let startBalance = 0;
    // Apply referral and get bonus
    let refBonus = 0;
    if (refCode) refBonus = await applyReferral(user, refCode);
    startBalance = refBonus;

    await saveUser(user, {
      password: pass, name, uid,
      balance: startBalance,
      totalWins: 0, bets: 0,
      blocked: false,
      referralCode: myRefCode,
      referralCount: 0,
      referralEarnings: 0,
      joinedAt: Date.now()
    });

    if (startBalance > 0) {
      await addTransaction(user, { type:'bonus', amount:startBalance, desc:'Welcome referral bonus', time:Date.now() });
    }

    btn.textContent='CREATE ACCOUNT'; btn.disabled=false;
    err.style.color='#86efac';
    err.textContent = refBonus > 0 ? `✅ Account created! +₹${refBonus} bonus added!` : '✅ Account created! Logging in...';
    setTimeout(() => { setSession(user); window.location.href='home.html'; }, 900);
  };
</script>
</body>
</html>
