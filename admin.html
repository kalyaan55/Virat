<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<style>

body{
font-family:Poppins;
padding:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

button{
padding:10px 20px;
background:#6c3bff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Kalyaan Admin</h2>

<div class="card">

<h3>Force Result</h3>

<input id="forceNum" type="number" min="0" max="9">

<button onclick="forceResult()">
Set Result
</button>

</div>


<div class="card">

<h3>Game Control</h3>

<button onclick="startRound()">

Start New Round

</button>

</div>

<script type="module" src="admin.js"></script>

</body>

</html>
